<!doctype html>
<html lang="zh-CN">
  <body style="margin:0;padding:32px;background:#f3f6f4;color:#17332b;font-family:Arial,'Noto Sans SC',sans-serif">
    <main style="max-width:560px;margin:0 auto;padding:28px;border:1px solid #d8e1dd;border-radius:14px;background:#ffffff">
      <p style="margin:0 0 8px;color:#2b8065;font-size:12px;font-weight:700;letter-spacing:.08em">LUMINA EDUCATION CRM</p>
      <h1 style="margin:0 0 12px;font-size:22px">确认新登录设备</h1>
      <p style="margin:0 0 18px;line-height:1.65">请在登录页面输入以下 6 位验证码。该验证码仅用于本次设备验证，请勿转发。</p>
      <p style="margin:0 0 20px;padding:16px;border-radius:10px;background:#edf7f2;text-align:center;font-size:30px;font-weight:800;letter-spacing:.22em">{{ .Token }}</p>
      <h2 style="margin:20px 0 8px;font-size:16px">Confirm a new sign-in device</h2>
      <p style="margin:0;color:#5c6f68;line-height:1.6">Enter the six-digit code above on the sign-in page. Never forward this one-time code. If you did not attempt to sign in, ignore this email and notify your administrator.</p>
    </main>
  </body>
</html>
