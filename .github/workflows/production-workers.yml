name: Production worker cycle

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-worker-cycle
  cancel-in-progress: false

jobs:
  workers:
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci --omit=dev
      - run: npm run workers:process
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRM_WORKSPACE_ID: ${{ secrets.CRM_WORKSPACE_ID }}
          EMAIL_DELIVERY_WEBHOOK_URL: ${{ secrets.EMAIL_DELIVERY_WEBHOOK_URL }}
          EMAIL_DELIVERY_WEBHOOK_TOKEN: ${{ secrets.EMAIL_DELIVERY_WEBHOOK_TOKEN }}
          WEBHOOKS_ENABLED: ${{ vars.WEBHOOKS_ENABLED }}
          WEBHOOK_PROCESSOR_URL: ${{ secrets.WEBHOOK_PROCESSOR_URL }}
          WEBHOOK_PROCESSOR_TOKEN: ${{ secrets.WEBHOOK_PROCESSOR_TOKEN }}
          INTEGRATION_SYNC_ENABLED: ${{ vars.INTEGRATION_SYNC_ENABLED }}
          INTEGRATION_SYNC_PROCESSOR_URL: ${{ secrets.INTEGRATION_SYNC_PROCESSOR_URL }}
          INTEGRATION_SYNC_PROCESSOR_TOKEN: ${{ secrets.INTEGRATION_SYNC_PROCESSOR_TOKEN }}
          OUTBOX_BATCH_SIZE: ${{ vars.OUTBOX_BATCH_SIZE || '20' }}
          CALENDAR_DELIVERY_BATCH_SIZE: ${{ vars.CALENDAR_DELIVERY_BATCH_SIZE || '20' }}
          EXPORT_BATCH_SIZE: ${{ vars.EXPORT_BATCH_SIZE || '10' }}
          REMINDER_BATCH_SIZE: ${{ vars.REMINDER_BATCH_SIZE || '100' }}
          WEBHOOK_BATCH_SIZE: ${{ vars.WEBHOOK_BATCH_SIZE || '20' }}
          INTEGRATION_SYNC_BATCH_SIZE: ${{ vars.INTEGRATION_SYNC_BATCH_SIZE || '10' }}
